<!DOCTYPE html>
<html>
<head><title>Mock Portal - Apply</title></head>
<body>
    <h1>Application Form</h1>
    <form method="post" action="/apply">
        <label>Full Name</label><br>
        <input type="text" name="full_name" id="full_name"><br><br>
        <label>Date of Birth</label><br>
        <input type="date" name="dob" id="dob"><br><br>
        <label>Aadhaar Number</label><br>
        <input type="text" name="aadhaar_number" id="aadhaar_number"><br><br>
        <button type="submit" id="btn-next">Next</button>
    </form>
</body>
</html>
